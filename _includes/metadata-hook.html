<script>
  (() => {
    const resetKey = "chara-cache-reset-v1";

    try {
      if (localStorage.getItem(resetKey)) return;
    } catch (_) {
      // Continue without persistent state when storage is unavailable.
    }

    window.addEventListener("load", async () => {
      if ("serviceWorker" in navigator) {
        const registrations = await navigator.serviceWorker.getRegistrations();
        await Promise.all(registrations.map((registration) => registration.unregister()));
      }

      if ("caches" in window) {
        const cacheNames = await caches.keys();
        await Promise.all(cacheNames.map((name) => caches.delete(name)));
      }

      try {
        localStorage.setItem(resetKey, "complete");
      } catch (_) {
        // Cache cleanup is still complete when storage is unavailable.
      }
    });
  })();
</script>
